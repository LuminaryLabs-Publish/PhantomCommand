name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy static site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist
          cp index.html dist/index.html
          cp game.html dist/game.html
          if [ -d src ]; then cp -R src dist/src; fi
          if [ -d docs ]; then cp -R docs dist/docs; fi
          if [ -d config ]; then cp -R config dist/config; fi
          touch dist/.nojekyll
          test -f dist/index.html
          test -f dist/game.html
          grep -q 'Immediate construct' dist/game.html
          grep -q 'const RING_COUNT=10;' dist/game.html
          grep -q 'const MOVE_SECONDS=' dist/game.html
          grep -q 'const DROP_START_SECONDS=' dist/game.html
          grep -q 'const START_HEIGHT_BASE=' dist/game.html
          find dist -maxdepth 3 -type f | sort

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
