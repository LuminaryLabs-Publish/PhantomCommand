name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy static site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate and prepare static artifact
        shell: bash
        run: |
          set -euo pipefail
          node --check src/menu/crt-renderer.js
          node --check src/menu/graveyard-art.js
          node --check src/menu/graveyard-menu.js
          node --check src/campaign/campaign-scene.js
          node scripts/check-menu.mjs
          node scripts/check-campaign.mjs
          node scripts/build-static.mjs
          touch dist/.nojekyll
          test -f dist/index.html
          test -f dist/game.html
          test -f dist/src/menu/crt-renderer.js
          test -f dist/src/campaign/campaign-scene.js
          grep -Fq 'src/menu/graveyard-menu.js' dist/index.html
          grep -Fq 'src/campaign/campaign-scene.js' dist/game.html
          grep -Fq 'const W = 640;' dist/src/campaign/campaign-scene.js
          grep -Fq 'Array.from({ length: 7 }' dist/src/campaign/campaign-scene.js
          grep -Fq 'window.GameHost=' dist/src/campaign/campaign-scene.js
          find dist -maxdepth 4 -type f | sort

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
