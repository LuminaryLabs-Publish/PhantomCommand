<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Phantom Command</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050607;
      --panel: rgba(7, 10, 10, 0.78);
      --line: rgba(190, 255, 225, 0.22);
      --text: #e9fff4;
      --muted: rgba(233, 255, 244, 0.72);
      --accent: #9affd3;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 38%, rgba(154, 255, 211, 0.18), transparent 24rem),
        radial-gradient(circle at 50% 50%, rgba(90, 84, 120, 0.18), transparent 42rem),
        linear-gradient(180deg, #0a0f13 0%, #050607 62%, #020303 100%);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -20vmax;
      background:
        repeating-radial-gradient(circle at center,
          rgba(154, 255, 211, 0.09) 0 1px,
          transparent 1px 38px);
      opacity: 0.35;
      animation: slowSpin 42s linear infinite;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.2) 54%, rgba(0,0,0,0.72) 100%);
      pointer-events: none;
    }

    main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .menu {
      width: min(680px, 92vw);
      padding: clamp(28px, 6vw, 56px);
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow:
        0 32px 90px rgba(0, 0, 0, 0.48),
        inset 0 1px 0 rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(18px);
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 9vw, 86px);
      line-height: 0.9;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-shadow: 0 0 30px rgba(154, 255, 211, 0.24);
    }

    .subtitle {
      max-width: 540px;
      margin: 22px auto 34px;
      color: var(--muted);
      font-size: clamp(15px, 2.4vw, 18px);
      line-height: 1.65;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    button,
    a.button {
      appearance: none;
      border: 1px solid rgba(154, 255, 211, 0.58);
      border-radius: 999px;
      padding: 14px 24px;
      background: rgba(154, 255, 211, 0.14);
      color: var(--text);
      font: inherit;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 0 28px rgba(154, 255, 211, 0.14);
      transition: transform 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    button:hover,
    a.button:hover,
    button:focus-visible,
    a.button:focus-visible {
      transform: translateY(-2px);
      background: rgba(154, 255, 211, 0.23);
      box-shadow: 0 0 42px rgba(154, 255, 211, 0.24);
      outline: none;
    }

    .small {
      margin-top: 26px;
      color: rgba(233, 255, 244, 0.46);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @keyframes slowSpin {
      from { transform: rotate(0deg) scale(1); }
      to { transform: rotate(360deg) scale(1); }
    }
  </style>
</head>
<body>
  <main aria-label="Phantom Command Main Menu">
    <section class="menu">
      <p class="eyebrow">Single-player PvE RTS prototype</p>
      <h1>Phantom Command</h1>
      <p class="subtitle">
        A ritual construct is forming around the Grim Reaper Totem. Start the opening scene to watch the infinite stone rings assemble.
      </p>
      <div class="actions">
        <button id="startButton" type="button">Start</button>
        <a class="button" href="game.html" aria-label="Open game scene directly">Open Scene</a>
      </div>
      <p class="small">Start loads <code>game.html</code></p>
    </section>
  </main>

  <script>
    document.getElementById("startButton").addEventListener("click", () => {
      window.location.href = "game.html";
    });
  </script>
</body>
</html>
