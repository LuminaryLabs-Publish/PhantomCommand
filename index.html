<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#05070b" />
  <title>Phantom Command</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020305}
    canvas{display:block;width:100%;height:100%;touch-action:none;cursor:none}
    .sr-only{position:fixed;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  </style>
</head>
<body>
  <canvas id="game" role="img" aria-label="Phantom Command main menu in an animated graveyard"></canvas>
  <nav class="sr-only" aria-label="Main menu">
    <button data-menu-action="new">Begin Campaign</button>
    <button data-menu-action="continue">Continue</button>
    <button data-menu-action="settings">Settings</button>
    <button data-menu-action="credits">Credits</button>
  </nav>
  <script type="module" src="./src/menu/graveyard-menu.js"></script>
</body>
</html>
