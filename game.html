<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Phantom Command</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#252a2e;font-family:system-ui,sans-serif;color:#eef3f7}canvas{display:block;width:100vw;height:100vh}.hud,.help{position:fixed;background:rgba(12,15,18,.78);border:1px solid rgba(255,255,255,.14);border-radius:14px;box-shadow:0 16px 48px rgba(0,0,0,.35);backdrop-filter:blur(10px)}.hud{top:16px;left:16px;width:350px;padding:14px 16px}.hud h1{margin:0 0 6px;font-size:14px;letter-spacing:.12em;text-transform:uppercase}.hud p{margin:0 0 10px;color:#c7d0d8;font-size:12px}.bar{height:7px;background:rgba(255,255,255,.13);border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;width:0;background:#dce8f2}.grid{display:grid;grid-template-columns:1fr auto;gap:6px 12px;margin-top:10px;font-size:12px}.help{right:16px;bottom:16px;padding:10px 12px;font-size:12px;line-height:1.55}button{margin-top:8px;margin-right:6px;padding:6px 9px;border-radius:8px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#eef5fb}</style>
</head>
<body>
<canvas id="game"></canvas>
<aside class="hud"><h1>Phantom Command</h1><p id="status">Ring gap v4: concentric rings are spaced apart and deploy as readable waves.</p><div class="bar"><i id="bar"></i></div><div class="grid"><span>Constructed</span><span id="count">0 / 0</span><span>Phase</span><span id="phase">forming</span><span>Build</span><span>ring-gap-v4</span></div></aside>
<aside class="help"><b>Controls</b><br>WASD / arrows: pan<br>Mouse wheel: zoom<br>Space: skip<br>R: restart<br><button id="skip">Skip</button><button id="restart">Restart</button></aside>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
const BUILD_ID='ring-gap-v4';
const RING_COUNT=10;
const FIRST_INNER_RADIUS=10;
const FIRST_RING_WIDTH=7;
const RING_WIDTH_GROWTH=1.25;
const MAX_RING_WIDTH=120;
const RING_GAP_BASE=5.5;
const RING_GAP_GROWTH=.75;
const MOVE_SECONDS=4.1;
const DROP_START_SECONDS=.12;
const RING_STAGGER=.24;
const PART_STAGGER=.04;
const PREWARM_SECONDS=.9;
const START_RADIUS_MULTIPLIER=1.45;
const START_HEIGHT_BASE=28;
const canvas=document.getElementById('game'),bar=document.getElementById('bar'),countEl=document.getElementById('count'),phaseEl=document.getElementById('phase'),statusEl=document.getElementById('status');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,logarithmicDepthBuffer:true});renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));renderer.setSize(innerWidth,innerHeight);
const scene=new THREE.Scene();scene.background=new THREE.Color(0x252a2e);scene.fog=new THREE.Fog(0x252a2e,900,9000);
const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.1,500000);let zoom=165,zoomTarget=165,orbit=-.42,last=0;
scene.add(new THREE.AmbientLight(0xdbe7f2,.75));let sun=new THREE.DirectionalLight(0xffffff,1.35);sun.position.set(-900,2300,1200);scene.add(sun);let fill=new THREE.DirectionalLight(0x9ebbea,.5);fill.position.set(2200,1000,-1800);scene.add(fill);
const mats=[0x6f6f6b,0x85847e,0x5d5e5c,0x97958d,0x74746f].map(x=>new THREE.MeshStandardMaterial({color:x,roughness:.94}));const dark=new THREE.MeshStandardMaterial({color:0x4f5050,roughness:.95});const line=new THREE.MeshBasicMaterial({color:0x101214,transparent:true,opacity:.38});
const parts=[],rings=[],input={keys:new Set(),target:new THREE.Vector3(),current:new THREE.Vector3(),velocity:new THREE.Vector3()};let startedAt=-PREWARM_SECONDS,complete=false,progress=0,phase='forming';
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function c01(v){return clamp(v,0,1)}function smooth(t){t=c01(t);return t*t*(3-2*t)}function ease(t){return 1-Math.pow(1-c01(t),3)}function rv(s,i){const n=Math.sin(s*91.7+i*17.13)*43758.5453;return n-Math.floor(n)}function polar(r,a,y=0){return new THREE.Vector3(Math.cos(a)*r,y,Math.sin(a)*r)}function ringParts(inner,outer){return clamp(Math.ceil(Math.PI*2*((inner+outer)*.5)/70),5,32)}
function wedge(inner,outer,span,height){const mid=(inner+outer)*.5,shape=new THREE.Shape(),steps=18,a0=-span*.5+.003,a1=span*.5-.003;shape.moveTo(Math.cos(a0)*outer-mid,Math.sin(a0)*outer);for(let k=1;k<=steps;k++){let a=a0+(a1-a0)*k/steps;shape.lineTo(Math.cos(a)*outer-mid,Math.sin(a)*outer)}for(let k=steps;k>=0;k--){let a=a0+(a1-a0)*k/steps;shape.lineTo(Math.cos(a)*inner-mid,Math.sin(a)*inner)}shape.closePath();let g=new THREE.ExtrudeGeometry(shape,{depth:height,bevelEnabled:true,bevelSegments:1,bevelSize:height*.1,bevelThickness:height*.12});g.rotateX(-Math.PI/2);g.translate(0,height*.5,0);return g}
function makePiece(ring,idx,inner,outer,span,angle){let seed=ring*100+idx*13,mid=(inner+outer)*.5,group=new THREE.Group(),mesh=new THREE.Mesh(wedge(inner,outer,span,1.18),mats[(ring+idx)%mats.length]);group.add(mesh);for(const aa of[-span*.5,span*.5]){let seam=new THREE.Mesh(new THREE.BoxGeometry(outer-inner,.035,.12),line);seam.position.set(Math.cos(aa)*mid-mid,1.23,Math.sin(aa)*mid);seam.rotation.y=-aa;group.add(seam)}let final=polar(mid,angle,0),start=polar(mid*START_RADIUS_MULTIPLIER,angle+(rv(seed,1)-.5)*.3,START_HEIGHT_BASE+ring*4+rv(seed,2)*14),finalY=-angle,startY=finalY+(rv(seed,3)-.5)*.9;group.position.copy(start);group.rotation.set((rv(seed,4)-.5)*.25,startY,(rv(seed,5)-.5)*.2);scene.add(group);parts.push({group,ring,idx,delay:ring*RING_STAGGER+idx*PART_STAGGER,start,final,startY,finalY})}
let inner=FIRST_INNER_RADIUS,width=FIRST_RING_WIDTH;for(let ring=0;ring<RING_COUNT;ring++){if(ring>0)width=Math.min(MAX_RING_WIDTH,width*RING_WIDTH_GROWTH);let outer=inner+width,gap=RING_GAP_BASE+ring*RING_GAP_GROWTH,n=ringParts(inner,outer);rings.push({inner,outer,gap,n});inner=outer+gap}rings.forEach((spec,ring)=>{let span=Math.PI*2/spec.n,offset=ring%2?span*.5:0;for(let idx=0;idx<spec.n;idx++)makePiece(ring,idx,spec.inner,spec.outer,span,offset+idx*span)});
let disc=new THREE.Mesh(new THREE.CylinderGeometry(FIRST_INNER_RADIUS-.35,FIRST_INNER_RADIUS-.35,1.18,96),mats[1]);disc.position.y=.59;scene.add(disc);let tower=new THREE.Group();tower.position.y=1.18;tower.add(new THREE.Mesh(new THREE.CylinderGeometry(4.2,5.8,.6,8),dark));let block=new THREE.Mesh(new THREE.BoxGeometry(4.4,3.4,4.4),dark);block.position.y=2.3;tower.add(block);scene.add(tower);let cmd=new THREE.Group();cmd.position.set(12,1.18,10);let body=new THREE.Mesh(new THREE.CylinderGeometry(.45,.75,2.2,10),dark);body.position.y=1.05;cmd.add(body);let hood=new THREE.Mesh(new THREE.SphereGeometry(.72,16,14),dark);hood.scale.set(1,.72,1);hood.position.y=2.25;cmd.add(hood);scene.add(cmd);
let totalBuild=(RING_COUNT-1)*RING_STAGGER+(Math.max(...rings.map(x=>x.n))-1)*PART_STAGGER+MOVE_SECONDS;function skip(){startedAt=-totalBuild-1;complete=false}function restart(){startedAt=performance.now()*.001-PREWARM_SECONDS;complete=false;progress=0;phase='forming'}document.getElementById('skip').onclick=skip;document.getElementById('restart').onclick=restart;addEventListener('keydown',e=>{let k=e.key.toLowerCase();if(['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright'].includes(k)){input.keys.add(k);e.preventDefault()}if(k===' '){skip();e.preventDefault()}if(k==='r'){restart();e.preventDefault()}});addEventListener('keyup',e=>input.keys.delete(e.key.toLowerCase()));addEventListener('blur',()=>input.keys.clear());canvas.addEventListener('wheel',e=>{e.preventDefault();zoomTarget=clamp(zoomTarget+e.deltaY*.08,24,760)},{passive:false});
function updatePan(dt){let x=(input.keys.has('d')||input.keys.has('arrowright')?1:0)-(input.keys.has('a')||input.keys.has('arrowleft')?1:0),z=(input.keys.has('s')||input.keys.has('arrowdown')?1:0)-(input.keys.has('w')||input.keys.has('arrowup')?1:0),v=new THREE.Vector3(x,0,z);if(v.lengthSq()>1)v.normalize();input.velocity.x+=v.x*1350*dt;input.velocity.z+=v.z*1350*dt;input.velocity.multiplyScalar(Math.pow(.06,dt));input.target.x=clamp(input.target.x+input.velocity.x*dt,-6500,6500);input.target.z=clamp(input.target.z+input.velocity.z*dt,-6500,6500);input.current.lerp(input.target,1-Math.exp(-10*dt));return input.current}
function construct(seq){let done=0;for(const p of parts){let local=c01((seq-p.delay)/MOVE_SECONDS);if(local>=1)done++;let radial=ease(local),drop=smooth((local*MOVE_SECONDS-DROP_START_SECONDS)/(MOVE_SECONDS-DROP_START_SECONDS)),pos=p.start.clone().lerp(p.final,radial);pos.y=p.start.y*(1-drop)+p.final.y*drop+Math.sin(local*Math.PI)*10;p.group.position.copy(pos);p.group.rotation.x=(1-drop)*Math.sin(local*Math.PI*2+p.idx)*.18;p.group.rotation.z=(1-drop)*Math.cos(local*Math.PI*2+p.ring)*.13;p.group.rotation.y=p.startY*(1-radial)+p.finalY*radial}progress=done/parts.length;if(done===parts.length&&!complete){complete=true;phase='command online'}else if(!complete){phase=progress>.66?'locking':progress>.25?'assembling':'forming'}bar.style.width=Math.round(progress*100)+'%';countEl.textContent=`${done} / ${parts.length}`;phaseEl.textContent=phase;statusEl.textContent=complete?'Command platform online.':'Ring gap v4: separated rings deploy as concentric waves.'}
function frame(ms){let time=ms*.001,dt=Math.min(.05,last?time-last:1/60);last=time;construct(time-startedAt);tower.rotation.y=Math.sin(time*.18)*.025;cmd.rotation.y=Math.sin(time*.45)*.18;cmd.position.y=1.18+Math.sin(time*1.2)*.12;zoom+=(zoomTarget-zoom)*(1-Math.exp(-10*dt));orbit+=dt*(complete?.045:.018);let pan=updatePan(dt);camera.position.copy(pan).add(new THREE.Vector3(Math.sin(orbit)*zoom*.18,zoom,Math.cos(orbit)*zoom*.74));camera.lookAt(pan.clone().add(new THREE.Vector3(0,.6,0)));renderer.render(scene,camera);requestAnimationFrame(frame)}window.GameHost={skipConstruct:skip,restartConstruct:restart,getState(){return{buildId:BUILD_ID,phase,progress,pieces:parts.length,rings:RING_COUNT,ringParts:rings.map(x=>x.n),ringGaps:rings.map(x=>x.gap),animation:{prewarmSeconds:PREWARM_SECONDS,moveSeconds:MOVE_SECONDS,ringStagger:RING_STAGGER,partStagger:PART_STAGGER,ringGapBase:RING_GAP_BASE,ringGapGrowth:RING_GAP_GROWTH,totalBuildTime:totalBuild}}}};addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});requestAnimationFrame(frame)
</script>
</body>
</html>
