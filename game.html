<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#05070a" />
  <title>Phantom Command — Grave Ring Campaign</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020305}
    canvas{display:block;width:100%;height:100%;touch-action:none;cursor:none}
    .sr-only{position:fixed;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  </style>
</head>
<body>
  <canvas id="game" role="application" aria-label="Phantom Command isometric grave ring campaign"></canvas>
  <section class="sr-only" aria-live="polite">
    Phantom Command campaign scene. Use WASD to pan, mouse wheel to zoom, drag to select units, right click to move or attack, number keys one through three to choose structures, and Space to start the next wave.
  </section>
  <script type="module" src="./src/campaign/campaign-scene.js"></script>
</body>
</html>
