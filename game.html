<!doctype html>
<html lang="en">
<!-- phantom-command-build: immediate-construct-v3 -->
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Phantom Command - Immediate Construct</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#20252a;font-family:system-ui,sans-serif;color:#edf3f8}#game{display:block;width:100vw;height:100vh}.panel{position:fixed;z-index:2;background:rgba(12,15,18,.78);border:1px solid rgba(255,255,255,.14);box-shadow:0 16px 48px rgba(0,0,0,.35);backdrop-filter:blur(10px);border-radius:14px}.hud{top:16px;left:16px;width:340px;padding:14px 16px}.hud h1{margin:0 0 6px;font-size:14px;letter-spacing:.12em;text-transform:uppercase}.hud p{margin:0 0 10px;color:#c7d0d8;font-size:12px;line-height:1.45}.meter{height:7px;border-radius:99px;background:rgba(255,255,255,.13);overflow:hidden}.meter i{display:block;height:100%;width:0%;background:linear-gradient(90deg,#9fb4c6,#f5fbff)}.readout{display:grid;grid-template-columns:1fr auto;gap:6px 12px;margin-top:10px;font-size:12px}.controls{right:16px;bottom:16px;padding:10px 12px;font-size:12px;line-height:1.55;color:#d8e0e6}button{margin-top:8px;margin-right:6px;padding:6px 9px;border-radius:8px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#eef5fb;cursor:pointer}#errorPanel{display:none;position:fixed;inset:24px;z-index:5;padding:18px;background:#451b1b;color:#ffe8e8;border-radius:14px;white-space:pre-wrap}
</style>
</head>
<body>
<canvas id="game"></canvas>
<aside class="panel hud"><h1>Phantom Command</h1><p id="status">Immediate construct v3: slabs are visible and moving on frame one.</p><div class="meter"><i id="bar"></i></div><div class="readout"><span>Constructed</span><span id="count">0 / 0</span><span>Phase</span><span id="phase">forming</span><span>Build</span><span>v3</span></div></aside>
<aside class="panel controls"><b>Controls</b><br>WASD / arrows: pan<br>Mouse wheel: zoom<br>Space: skip<br>R: restart<br><button id="skip">Skip</button><button id="restart">Restart</button></aside>
<section id="errorPanel" role="alert"></section>
<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
const RING_COUNT=10;
const TARGET_MAX_WEDGE_ARC=70;
const MIN_PARTS_PER_RING=5;
const MAX_PARTS_PER_RING=32;
const FIRST_INNER_RADIUS=10;
const FIRST_RING_WIDTH=7;
const RING_WIDTH_GROWTH=1.25;
const MAX_RING_WIDTH=120;
const SLAB_HEIGHT=1.18;
const CONSTRUCT_PREWARM_SECONDS=.95;
const MOVE_SECONDS=3.6;
const DROP_START_SECONDS=.12;
const RING_STAGGER=.12;
const PART_STAGGER=.03;
const START_RADIUS_MULTIPLIER=1.45;
const START_HEIGHT_BASE=28;
const START_HEIGHT_RING_STEP=4;
const canvas=document.getElementById('game'),bar=document.getElementById('bar'),countEl=document.getElementById('count'),phaseEl=document.getElementById('phase'),statusEl=document.getElementById('status'),errorPanel=document.getElementById('errorPanel');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,logarithmicDepthBuffer:true});renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));renderer.setSize(innerWidth,innerHeight);renderer.shadowMap.enabled=true;renderer.outputColorSpace=THREE.SRGBColorSpace;renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.08;
const scene=new THREE.Scene();scene.background=new THREE.Color(0x252a2e);scene.fog=new THREE.Fog(0x252a2e,700,7000);
const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.1,500000);let zoom=120,zoomTarget=120,orbit=-.42,last=0;
scene.add(new THREE.AmbientLight(0xdbe7f2,.72));const sun=new THREE.DirectionalLight(0xffffff,1.45);sun.position.set(-900,2300,1200);sun.castShadow=true;sun.shadow.mapSize.set(2048,2048);scene.add(sun);const fill=new THREE.DirectionalLight(0x9ebbea,.55);fill.position.set(2200,1000,-1800);scene.add(fill);
const stone=[0x6f6f6b,0x85847e,0x5d5e5c,0x97958d,0x74746f].map(c=>new THREE.MeshStandardMaterial({color:c,roughness:.95,metalness:.02}));const dark=new THREE.MeshStandardMaterial({color:0x4f5050,roughness:.95});const glow=new THREE.MeshStandardMaterial({color:0xf6fbff,emissive:0xb8d2ff,emissiveIntensity:.8,roughness:.45});const lineMat=new THREE.MeshBasicMaterial({color:0x111416,transparent:true,opacity:.38,depthWrite:false});
const parts=[],rings=[],input={keys:new Set(),target:new THREE.Vector3(),current:new THREE.Vector3(),velocity:new THREE.Vector3()};let startedAt=-CONSTRUCT_PREWARM_SECONDS,complete=false,skipped=false,phase='forming',progress=0;
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function c01(v){return clamp(v,0,1)}function smooth(t){t=c01(t);return t*t*(3-2*t)}function ease(t){return 1-Math.pow(1-c01(t),3)}function rv(s,i){const n=Math.sin(s*91.7+i*17.13)*43758.5453;return n-Math.floor(n)}function polar(r,a,y=0){return new THREE.Vector3(Math.cos(a)*r,y,Math.sin(a)*r)}function partsFor(i,o){return clamp(Math.ceil(Math.PI*2*((i+o)*.5)/TARGET_MAX_WEDGE_ARC),MIN_PARTS_PER_RING,MAX_PARTS_PER_RING)}
function wedge(inner,outer,span,h,seed){const mid=(inner+outer)*.5,shape=new THREE.Shape(),steps=18,a0=-span*.5+.002,a1=span*.5-.002;function p(r,a,j=0){return{x:Math.cos(a)*(r+j)-mid,y:Math.sin(a)*(r+j)}}let q=p(outer,a0);shape.moveTo(q.x,q.y);for(let i=1;i<=steps;i++){const a=a0+(a1-a0)*i/steps;q=p(outer,a,(rv(seed,i)-.5)*.5);shape.lineTo(q.x,q.y)}for(let i=steps;i>=0;i--){const a=a0+(a1-a0)*i/steps;q=p(inner,a,(rv(seed,100+i)-.5)*.25);shape.lineTo(q.x,q.y)}shape.closePath();const g=new THREE.ExtrudeGeometry(shape,{depth:h,bevelEnabled:true,bevelSegments:2,bevelSize:h*.12,bevelThickness:h*.14});g.rotateX(-Math.PI/2);g.translate(0,h*.5,0);return g}
function makePiece(ring,idx,inner,outer,span,angle){const seed=ring*100+idx*13,mid=(inner+outer)*.5,group=new THREE.Group();const mesh=new THREE.Mesh(wedge(inner,outer,span,SLAB_HEIGHT,seed),stone[(ring+idx)%stone.length]);mesh.castShadow=true;mesh.receiveShadow=true;group.add(mesh);for(const a of[-span*.5,span*.5]){const seam=new THREE.Mesh(new THREE.BoxGeometry(outer-inner,.035,.12),lineMat);seam.position.set(Math.cos(a)*mid-mid,SLAB_HEIGHT+.04,Math.sin(a)*mid);seam.rotation.y=-a;group.add(seam)}for(let i=0;i<2;i++){const a=-span*.28+span*.56*rv(seed,i+40),rr=inner+(outer-inner)*(.25+.5*rv(seed,i+80));const crack=new THREE.Mesh(new THREE.BoxGeometry(3+rv(seed,i+90)*7,.03,.08),lineMat);crack.position.set(Math.cos(a)*rr-mid,SLAB_HEIGHT+.08,Math.sin(a)*rr);crack.rotation.y=-a+(rv(seed,i+130)-.5);group.add(crack)}const final=polar(mid,angle,0),start=polar(mid*START_RADIUS_MULTIPLIER,angle+(rv(seed,901)-.5)*.32,START_HEIGHT_BASE+ring*START_HEIGHT_RING_STEP+rv(seed,930)*14),finalRy=-angle,startRy=finalRy+(rv(seed,940)-.5)*.9;group.position.copy(start);group.rotation.set((rv(seed,950)-.5)*.25,startRy,(rv(seed,960)-.5)*.2);scene.add(group);parts.push({group,ring,idx,delay:ring*RING_STAGGER+idx*PART_STAGGER,start,final,startRy,finalRy})}
function addCenter(){const disc=new THREE.Mesh(new THREE.CylinderGeometry(FIRST_INNER_RADIUS-.35,FIRST_INNER_RADIUS-.35,1.18,96),stone[1]);disc.position.y=.59;disc.castShadow=true;disc.receiveShadow=true;scene.add(disc);const g=new THREE.Group();g.position.y=1.18;const base=new THREE.Mesh(new THREE.CylinderGeometry(4.2,5.8,.6,8),dark);base.position.y=.3;g.add(base);const tower=new THREE.Mesh(new THREE.BoxGeometry(4.4,3.4,4.4),dark);tower.position.y=2.3;g.add(tower);const top=new THREE.Mesh(new THREE.BoxGeometry(8.5,.7,8.5),dark);top.position.y=4.35;g.add(top);const core=new THREE.Mesh(new THREE.SphereGeometry(.45,24,24),glow);core.position.y=2.9;g.add(core);const ring=new THREE.Mesh(new THREE.TorusGeometry(6.2,.06,8,96),new THREE.MeshBasicMaterial({color:0xc5d9ff,transparent:true,opacity:.28}));ring.rotation.x=Math.PI/2;ring.position.y=4.75;g.add(ring);scene.add(g);return{g,core,ring}}
function addPhantom(){const g=new THREE.Group();g.position.set(12,1.18,10);const body=new THREE.Mesh(new THREE.CylinderGeometry(.45,.75,2.2,10),dark);body.position.y=1.05;g.add(body);const hood=new THREE.Mesh(new THREE.SphereGeometry(.72,16,14),dark);hood.scale.set(1,.72,1);hood.position.y=2.25;g.add(hood);const count=90,pos=new Float32Array(count*3),geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.BufferAttribute(pos,3));const smoke=new THREE.Points(geo,new THREE.PointsMaterial({color:0x22282c,size:1.8,transparent:true,opacity:.6,depthWrite:false}));smoke.position.y=.55;g.add(smoke);scene.add(g);return{g,update(t){for(let i=0;i<count;i++){const y=(rv(13,i)*4+t*(.35+rv(17,i)*.8))%4.4,a=rv(7,i)*Math.PI*2+Math.sin(t*.25+rv(19,i)*10)*.4,rr=.35+rv(11,i)*1.25+y*.18;pos[i*3]=Math.cos(a)*rr+Math.sin(t*.8+i)*.35;pos[i*3+1]=y;pos[i*3+2]=Math.sin(a)*rr}geo.attributes.position.needsUpdate=true;g.rotation.y=Math.sin(t*.45)*.18;g.position.y=1.18+Math.sin(t*1.2)*.12}}}
let inner=FIRST_INNER_RADIUS,width=FIRST_RING_WIDTH;for(let r=0;r<RING_COUNT;r++){if(r>0)width=Math.min(MAX_RING_WIDTH,width*RING_WIDTH_GROWTH);const outer=inner+width,n=partsFor(inner,outer);rings.push({inner,outer,n});inner=outer+Math.max(.18,width*.0007)}rings.forEach((spec,r)=>{const span=Math.PI*2/spec.n,off=r%2?span*.5:0;for(let i=0;i<spec.n;i++)makePiece(r,i,spec.inner,spec.outer,span,off+i*span)});const maxParts=Math.max(...rings.map(r=>r.n)),totalBuild=(RING_COUNT-1)*RING_STAGGER+(maxParts-1)*PART_STAGGER+MOVE_SECONDS,totem=addCenter(),phantom=addPhantom();const fog=new THREE.Mesh(new THREE.CircleGeometry(120000,128),new THREE.MeshBasicMaterial({color:0x394047,transparent:true,opacity:.46}));fog.rotation.x=-Math.PI/2;fog.position.y=-500;scene.add(fog);
function skip(){skipped=true;complete=false;startedAt=-totalBuild-1}function restart(){startedAt=performance.now()*.001-CONSTRUCT_PREWARM_SECONDS;complete=false;skipped=false;progress=0;phase='forming'}document.getElementById('skip').onclick=skip;document.getElementById('restart').onclick=restart;addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright'].includes(k)){input.keys.add(k);e.preventDefault()}if(k===' '){skip();e.preventDefault()}if(k==='r'){restart();e.preventDefault()}});addEventListener('keyup',e=>input.keys.delete(e.key.toLowerCase()));addEventListener('blur',()=>input.keys.clear());canvas.addEventListener('wheel',e=>{e.preventDefault();zoomTarget=clamp(zoomTarget+e.deltaY*.08,24,620)},{passive:false});
function pan(dt){const x=(input.keys.has('d')||input.keys.has('arrowright')?1:0)-(input.keys.has('a')||input.keys.has('arrowleft')?1:0),z=(input.keys.has('s')||input.keys.has('arrowdown')?1:0)-(input.keys.has('w')||input.keys.has('arrowup')?1:0),v=new THREE.Vector3(x,0,z);if(v.lengthSq()>1)v.normalize();input.velocity.x+=v.x*1350*dt;input.velocity.z+=v.z*1350*dt;input.velocity.multiplyScalar(Math.pow(.06,dt));input.target.x=clamp(input.target.x+input.velocity.x*dt,-6500,6500);input.target.z=clamp(input.target.z+input.velocity.z*dt,-6500,6500);input.current.lerp(input.target,1-Math.exp(-10*dt));return input.current}
function construct(seq){let done=0;for(const p of parts){const local=c01((seq-p.delay)/MOVE_SECONDS);if(local>=1)done++;const radial=ease(local),drop=smooth((local*MOVE_SECONDS-DROP_START_SECONDS)/(MOVE_SECONDS-DROP_START_SECONDS)),pos=p.start.clone().lerp(p.final,radial);pos.y=p.start.y*(1-drop)+p.final.y*drop+Math.sin(local*Math.PI)*10;p.group.position.copy(pos);p.group.rotation.x=(1-drop)*Math.sin(local*Math.PI*2+p.idx)*.18;p.group.rotation.z=(1-drop)*Math.cos(local*Math.PI*2+p.ring)*.13;p.group.rotation.y=p.startRy*(1-radial)+p.finalRy*radial}progress=done/parts.length;if(done===parts.length&&!complete){complete=true;phase='command online'}else if(!complete){phase=progress>.66?'locking':progress>.25?'assembling':'forming'}bar.style.width=Math.round(progress*100)+'%';countEl.textContent=`${done} / ${parts.length}`;phaseEl.textContent=phase;statusEl.textContent=complete?'Command platform online. Phantom commander anchored.':'Immediate construct v3: visible slabs fly inward, descend, and lock from the first frame.'}
function animate(ms){try{const t=ms*.001,dt=Math.min(.05,last?t-last:1/60);last=t;construct(t-startedAt);totem.g.rotation.y=Math.sin(t*.18)*.025;totem.core.scale.setScalar(1+Math.sin(t*2.6)*.08+(complete?.06:0));totem.ring.rotation.z+=dt*(complete?.9:.28);phantom.update(t);zoom+=(zoomTarget-zoom)*(1-Math.exp(-10*dt));orbit+=dt*(complete?.045:.018);const p=pan(dt);camera.position.copy(p).add(new THREE.Vector3(Math.sin(orbit)*zoom*.18,zoom,Math.cos(orbit)*zoom*.74));camera.lookAt(p.clone().add(new THREE.Vector3(0,.6,0)));renderer.render(scene,camera);requestAnimationFrame(animate)}catch(e){errorPanel.style.display='block';errorPanel.textContent=String(e?.stack||e)}}
window.GameHost={skipConstruct:skip,restartConstruct:restart,getState(){return{buildId:'immediate-construct-v3',phase,progress,pieces:parts.length,rings:RING_COUNT,ringParts:rings.map(r=>r.n),animation:{prewarmSeconds:CONSTRUCT_PREWARM_SECONDS,moveSeconds:MOVE_SECONDS,dropStartSeconds:DROP_START_SECONDS,ringStagger:RING_STAGGER,partStagger:PART_STAGGER,startHeightBase:START_HEIGHT_BASE,startHeightRingStep:START_HEIGHT_RING_STEP,startRadiusMultiplier:START_RADIUS_MULTIPLIER,totalBuildTime:totalBuild},note:'Starts prewarmed with low visible spawn height and short stagger.'}}};addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));renderer.setSize(innerWidth,innerHeight)});requestAnimationFrame(animate);
</script>
</body>
</html>
